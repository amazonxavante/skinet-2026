<div class="mx-auto max-w-4xl w-full space-y-6">
  <div class="space-y-4 rounded-lg border border-gray-200 p-4 bg-white shadow-sm">
    
    <p class="text-xl font-semibold">Order Summary</p>

    <div class="space-y-4">

      <div class="space-y-3">

        <!-- Subtotal -->
        <dl class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-1 sm:gap-4">
          <dt class="font-medium text-gray-500">Subtotal</dt>
          <dd class="font-semibold text-gray-900">
            {{cartService.totals()?.subtotal | currency}}</dd>
        </dl>

        <!-- Discount -->
        <dl class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-1 sm:gap-4">
          <dt class="font-medium text-gray-500">Discount</dt>
          <dd class="font-semibold text-green-500">-{{cartService.totals()?.discount |currency}}</dd>
        </dl>

        <!-- Delivery -->
        <dl class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-1 sm:gap-4">
          <dt class="font-medium text-gray-500">Delivery Fee</dt>
          <dd class="font-semibold text-gray-900">
            {{cartService.totals()?.shipping |currency}}
          </dd>
        </dl>

      </div>

      <!-- Total -->
      <dl class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-1 sm:gap-4 border-t pt-3">
        <dt class="font-medium text-gray-500">Total</dt>
        <dd class="font-semibold text-gray-900 text-lg">
          {{cartService.totals()?.total |currency}}
        </dd>
      </dl>

    </div>
    <div class="flex flex-col gap-2">
        <button type="button" routerLink="/checkout" mat-flat-button>Checkout</button>
        <button type="button" routerLink="/shop" mat-button>Continue Shopping</button>
    </div>

  </div>
  <div class="space-y-4 rounded-lg border border-gray-200 bg-white shadow-sm">
    <form input type="text" class="space-y-2 flex flex-col p-2">
        <label class="mb-2 block text-sm font-medium">
            Do you have a coucher code?
        </label>
        <mat-form-field appearance="outline">
            <mat-label>Voucher code</mat-label>
            <input type="text" matInput>
        </mat-form-field>

        <button type="button" mat-button>Apply Code</button>

    </form>
  </div>
</div>
