<div class="container mt-5 p-4 bg-gray-500 rounded shadow-lg">
    <h1 class="text-2xl font-semibold mb-4">Internal server error</h1>
    @if(error){
        <h5 class="text-red-500">Error: {{error.message}}</h5>
        <p class="font-bold mb-2">This Error comes from server, no Angular</p>
        <p class="mb-2">What to do next?</p>
        <ol class="list-decimal ml-5 mb-4">
            <li class="mb-1">check the network tab i chrome dev tools</li>
            <li class="mb-1">Reproduce the Error in Postman.
                If the error don't wast time troubleshooting angular code</li>

        </ol>
        <h5 class="text-lg font-semibold mb-2">Stack trace</h5>
        <mat-card class="p-4 bg-white">
            <code class="block whitespace-pre-wrap">{{error?.details}}</code>
        </mat-card>
    }
</div>
