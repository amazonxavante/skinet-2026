@if(product){
  <mat-card 
    class="w-full max-w-sm mx-auto overflow-hidden rounded-lg shadow-md"
    appearance="raised"
    [routerLink]="['/shop', product.id]">

    <!-- Image -->
    <div class="w-full h-48 overflow-hidden">
      <img 
        [src]="product.pictureUrl" 
        [alt]="product.name"
        class="w-full h-full object-cover"
        loading="lazy"
      >
    </div>

    <!-- Content -->
    <mat-card-content class="p-4">
      <h2 class="text-base sm:text-lg font-semibold line-clamp-2">
        {{ product.name }}
      </h2>

      <p class="text-gray-700 font-bold mt-2">
        {{ product.price | currency }}
      </p>
    </mat-card-content>

    <!-- Actions -->
    <mat-card-actions class="p-4 pt-0" (click)="$event.stopPropagation()">
      <button  
        type="button" 
        mat-stroked-button 
        class="w-full"
        (click)="cartService.AddItemToCart(product)">        
        <mat-icon>add_shopping_cart</mat-icon>
        Add to Cart 
      </button>
    </mat-card-actions>

  </mat-card>
}
