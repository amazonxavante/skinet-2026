@if (products){

<div class="flex flex-col gap-4 px-4">

  <!-- Top controls -->
  <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">

    <!-- Paginator -->
    <mat-paginator
      (page)="handlePageEvent($event)"
      [length]="products.count"
      [pageSize]="shopParams.pageSize"
      [showFirstLastButtons]="true"
      [pageSizeOptions]="pageSizeOptions"
      [pageIndex]="shopParams.pageNumber - 1">
    </mat-paginator>

    <!-- Search -->
    <form #searchForm="ngForm" 
      (ngSubmit)="onSearchChange()"
      class="relative flex items-center w-full lg:max-w-md">

      <input 
        type="search"
        class="block w-full p-3 text-sm border border-gray-300 rounded-lg bg-gray-50 focus:border-blue-500 focus:ring-blue-500"
        placeholder="Search" 
        name="search"
        [(ngModel)]="shopParams.search">

      <button mat-icon-button type="submit"
        class="absolute right-2 top-1/2 -translate-y-1/2">
        <mat-icon class="text-gray-500">search</mat-icon>
      </button>
    </form>

    <!-- Buttons -->
    <div class="flex flex-wrap gap-2">
      <button mat-stroked-button (click)="openFiltersDialog()">
        <mat-icon>filter_list</mat-icon>
        Filters
      </button>

      <button mat-stroked-button [matMenuTriggerFor]="sortmenu">
        <mat-icon>swap_vert</mat-icon>
        Sort
      </button>
    </div>

  </div>

  <!-- Product Grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
    @for (product of products.data; track product.id){
      <app-product-item [product]="product"></app-product-item>
    }
  </div>

</div>

<mat-menu #sortmenu="matMenu">
  <mat-selection-list [multiple]="false" (selectionchange)="onSortChange($event)">
    @for (sort of sortOptions; track $index) {
      <mat-list-option 
        [value]="sort.value" 
        [selected]="shopParams.sort === sort.value">
        {{sort.name}}
      </mat-list-option>
    }
  </mat-selection-list>
</mat-menu>

}
