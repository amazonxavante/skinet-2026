<div class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm mb-4">

  <div class="flex flex-col sm:flex-row gap-4 sm:items-center sm:justify-between">

    <!-- Image -->
    <a [routerLink]="['/shop', item().productId]" class="shrink-0">
      <img 
        [src]="item().pictureUrl"
        alt="product image"
        class="h-20 w-20 object-cover rounded-md"
      >
    </a>

    <!-- Content -->
    <div class="flex flex-col flex-1 space-y-2">
      <a [routerLink]="['/shop', item().productId]" class="font-medium">
        {{ item().productName }}
      </a>

      <button 
        type="button" 
        (click)="removeItemFromCart()" 
        mat-button 
        class="text-red-700 flex gap-2 items-center w-fit">
        <mat-icon>delete</mat-icon>
        <span>Delete</span>
      </button>
    </div>

    <!-- Quantity + Price -->
    <div class="flex flex-row sm:flex-col items-center justify-between gap-4">

      <!-- Quantity -->
      <div class="flex items-center gap-3">
        <button type="button" mat-icon-button (click)="decrementQuantity()">
          <mat-icon class="text-red-600!">remove</mat-icon>
        </button>

        <div class="font-semibold text-lg">
          {{ item().quantity }}
        </div>

        <button type="button" mat-icon-button (click)="incrementQuantity()">
          <mat-icon class="text-green-600!">add</mat-icon>
        </button>
      </div>

      <!-- Price -->
      <div class="text-right">
        <p class="font-bold text-lg sm:text-xl text-gray-900">
          {{ item().price | currency }}
        </p>
      </div>

    </div>

  </div>
</div>
